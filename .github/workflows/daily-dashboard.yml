name: Daily Sentiment Dashboard

on:
  schedule:
    # 00:00 UTC = 08:00 Asia/Shanghai
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  send-dashboard:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      SMTP_HOST: smtp.qq.com
      SMTP_PORT: "465"
      SMTP_USER: 4895557@qq.com
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || secrets.QQMAIL }}
      MAIL_TO: 4895557@qq.com,834170548@qq.com
      XUEQIU_COOKIE: ${{ secrets.XUEQIU_COOKIE }}
      HOLIDAY_DATES: ${{ vars.HOLIDAY_DATES }}
      WORKDAY_DATES: ${{ vars.WORKDAY_DATES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send dashboard
        run: python sentiment_dashboard.py
