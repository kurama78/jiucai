name: Daily Sentiment Dashboard

on:
  schedule:
    # 00:00 UTC = 08:00 Asia/Shanghai
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  send-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      XUEQIU_COOKIE: ${{ secrets.XUEQIU_COOKIE }}
      HOLIDAY_DATES: ${{ vars.HOLIDAY_DATES }}
      WORKDAY_DATES: ${{ vars.WORKDAY_DATES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send dashboard
        run: python sentiment_dashboard.py
